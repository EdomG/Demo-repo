AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AISSMDoc:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '0.3'
        parameters:
          - name: StackName
            type: String
            description: Target CloudFormation stack name
          - name: BucketName
            type: String
            description: Target S3 bucket name
          - name: InstanceId
            type: String
            description: Target EC2 instance ID
          - name: DBInstanceIdentifier
            type: String
            description: Target RDS instance identifier
        mainSteps:
          - name: fixIssue
            action: aws:executeAwsApi
            inputs:
              Service: Cloudformation
              Api: setTerminationProtection
              Parameters:
                EnableTerminationProtection: true
                StackName: "{{ .Parameters.StackName }}"
      DocumentFormat: YAML
      DocumentType: Automation
      Tags:
        - Key: Case
          Value: '3-AI'
        - Key: Finding
          Value: 'CloudFormation stacks should have termination protection enabled'