AWSTemplateFormatVersion: '2010-09-09'
Description: 'SAFE Auto-remediation for S3 general purpose buckets should require requests to use SSL'
Parameters:
  TargetResource:
    Type: String
Resources:
  SafeRemediationDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '0.3'
        description: 'CASE 3 Safe remediation template'
        mainSteps:
        - name: safeVerification
          action: 'aws:executeScript'
          inputs:
            Runtime: python3.10
            Script: |
              print("✅ CASE 3 SAFE remediation deployed")
      DocumentFormat: YAML
      DocumentType: Automation
