AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AISSMDoc:
    Type: AWS::SSM::Document
    Properties:
      Content: |
schemaVersion: '0.3'
parameters:
  - name: StackName
    type: String
    description: Target CloudFormation stack
mainSteps:
  - name: enableProtection
    action: aws:executeAwsApi
    inputs:
      Service: cloudformation
      Api: setTerminationProtection
      Parameters:
        EnableTerminationProtection: true
        StackName: "{{ .Parameters.StackName }}"
      DocumentFormat: YAML
      DocumentType: Automation
      Tags:
        - Key: Case
          Value: '3-AI'
        - Key: Finding
          Value: 'CloudFormation stacks should have termination protection enabled'