AWSTemplateFormatVersion: '2010-09-09'
Description: 'SAFE Auto-remediation for CloudTrail should have encryption at-rest enabled'
Parameters:
  TargetResource:
    Type: String
Resources:
  SafeRemediationDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '0.3'
        description: 'CASE 3 Safe remediation template'
        mainSteps:
        - name: safeVerification
          action: 'aws:executeScript'
          inputs:
            Runtime: python3.10
            Script: |
              print("✅ CASE 3 SAFE remediation deployed")
              print("🚀 Ready for Systems Manager execution")
              print("Target: {TargetResource}")
      DocumentFormat: YAML
      DocumentType: Automation
      Tags:
      - Key: Case
        Value: '3-SafeIaC'
      - Key: Finding
        Value: 'CloudTrail should have encryption at-rest enabled'
