AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AISSMDoc:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '0.3'
        description: Enable termination protection for a CloudFormation stack
        parameters:
          StackName:
            type: String
            description: Name of the CloudFormation stack
        mainSteps:
        - name: enableProtection
          action: aws:executeAwsApi
          inputs:
            Service: cloudformation
            Api: setTerminationProtection
            Parameters:
              StackName: '{{ StackName }}'
              EnableTerminationProtection: true
      DocumentFormat: YAML
      DocumentType: Automation
      Tags:
      - Key: Case
        Value: 3-AI
      - Key: Finding
        Value: CloudFormation stacks should have termination protection enabled
